services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-review_db}
      POSTGRES_USER: ${POSTGRES_USER:-review_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-review_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-review_user} -d ${POSTGRES_DB:-review_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.26
    environment:
      - DB=postgres12
      - POSTGRES_SEEDS=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-review_user}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-review_pass}
      - POSTGRES_DB=temporal
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233 2>/dev/null | grep -q SERVING || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      temporal:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python -m app.temporal.worker
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy

volumes:
  pgdata:
